<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3D Portfolio with Stats</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* Окно статистики */
        .stats-box {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.7); color: #00ff00;
            padding: 10px; border-radius: 8px; font-size: 12px;
            border: 1px solid rgba(0, 255, 0, 0.3); pointer-events: none;
            z-index: 100; min-width: 120px;
        }

        .controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; background: rgba(0,0,0,0.8);
            padding: 10px 15px; border-radius: 25px; z-index: 100;
        }
        button {
            background: #333; color: white; border: none; padding: 12px 20px;
            border-radius: 18px; cursor: pointer; font-size: 14px; font-weight: bold;
            transition: 0.2s;
        }
        button.active { background: #0088cc; }
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="loader">SCANNING GEOMETRY...</div>
    
    <div class="stats-box" id="stats" style="display: none;">
        <div>MODEL INFO:</div>
        <hr style="border: 0.5px solid rgba(0,255,0,0.2)">
        <div>Tris: <span id="tris">0</span></div>
        <div>Verts: <span id="verts">0</span></div>
    </div>

    <div class="controls">
        <button id="btnFinal" class="active" onclick="changeView('final')">Final</button>
        <button id="btnGray" onclick="changeView('clay')">Clay</button>
        <button id="btnWire" onclick="changeView('wire')">Wire</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, mainModel;
        let originalMaterials = new Map();
        const clayMaterial = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.8 });

        window.changeView = function(mode) {
            if (!mainModel) return;
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            if(mode === 'final') document.getElementById('btnFinal').classList.add('active');
            if(mode === 'clay') document.getElementById('btnGray').classList.add('active');
            if(mode === 'wire') document.getElementById('btnWire').classList.add('active');

            mainModel.traverse(c => {
                if (c.isMesh) {
                    const wire = c.getObjectByName("wireframe");
                    if (mode === 'final') {
                        c.material = originalMaterials.get(c.uuid);
                        if(wire) wire.visible = false;
                    } else if (mode === 'clay') {
                        c.material = clayMaterial;
                        if(wire) wire.visible = false;
                    } else if (mode === 'wire') {
                        c.material = clayMaterial;
                        if(wire) wire.visible = true;
                    }
                }
            });
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
            const light = new THREE.DirectionalLight(0xffffff, 2);
            light.position.set(5, 5, 5);
            scene.add(light);

            const loader = new GLTFLoader();
            loader.load('jabahab.glb', (gltf) => {
                mainModel = gltf.scene;

                // Считаем полигоны
                let totalTris = 0;
                let totalVerts = 0;

                const box = new THREE.Box3().setFromObject(mainModel);
                const center = box.getCenter(new THREE.Vector3());
                mainModel.position.sub(center);
                scene.add(mainModel);

                mainModel.traverse(c => {
                    if (c.isMesh) {
                        // Подсчет статистики
                        const geom = c.geometry;
                        totalTris += geom.index ? geom.index.count / 3 : geom.attributes.position.count / 3;
                        totalVerts += geom.attributes.position.count;

                        originalMaterials.set(c.uuid, c.material);
                        
                        const wGeom = new THREE.WireframeGeometry(c.geometry);
                        const wLine = new THREE.LineSegments(wGeom, new THREE.LineBasicMaterial({ 
                            color: 0x00aaff, transparent: true, opacity: 0.4 
                        }));
                        wLine.name = "wireframe";
                        wLine.visible = false;
                        c.add(wLine); 
                    }
                });

                // Выводим статистику
                document.getElementById('tris').innerText = Math.round(totalTris).toLocaleString();
                document.getElementById('verts').innerText = totalVerts.toLocaleString();
                document.getElementById('stats').style.display = 'block';
                document.getElementById('loader').style.display = 'none';

            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
