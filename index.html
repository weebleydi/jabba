<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>jabb</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        .controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(0,0,0,0.8);
            padding: 8px 12px; border-radius: 20px; z-index: 10;
        }
        button {
            background: #333; color: white; border: none; padding: 10px 18px;
            border-radius: 15px; cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        button.active { background: #0088cc; }
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="loader">Loading...</div>
    <div class="controls">
        <button id="btnFinal" class="active">Final</button>
        <button id="btnGray">Clay</button>
        <button id="btnWire">Wireframe</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, mainModel;
        let originalMaterials = new Map(); // Хранилище родных текстур
        const clayMaterial = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.8 });

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2));
            const light = new THREE.DirectionalLight(0xffffff, 2);
            light.position.set(5, 5, 5);
            scene.add(light);

            const loader = new GLTFLoader();
            loader.load('jabahab.glb', (gltf) => {
                mainModel = gltf.scene;

                // Центрируем один раз
                const box = new THREE.Box3().setFromObject(mainModel);
                const center = box.getCenter(new THREE.Vector3());
                mainModel.position.sub(center);
                scene.add(mainModel);

                // Запоминаем родные материалы и создаем сетку сразу на мешах
                mainModel.traverse(c => {
                    if (c.isMesh) {
                        originalMaterials.set(c.uuid, c.material);
                        
                        // Создаем сетку как дочерний объект каждого конкретного меша
                        const wGeom = new THREE.WireframeGeometry(c.geometry);
                        const wLine = new THREE.LineSegments(wGeom, new THREE.LineBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.5 }));
                        wLine.name = "wireframe";
                        wLine.visible = false;
                        c.add(wLine); 
                    }
                });

                document.getElementById('loader').style.display = 'none';
            });

            // Логика кнопок
            const bF = document.getElementById('btnFinal'), bG = document.getElementById('btnGray'), bW = document.getElementById('btnWire');
            
            const setMode = (mode) => {
                [bF, bG, bW].forEach(b => b.classList.remove('active'));
                mainModel.traverse(c => {
                    if (c.isMesh) {
                        const wire = c.getObjectByName("wireframe");
                        if (mode === 'final') {
                            c.material = originalMaterials.get(c.uuid);
                            if(wire) wire.visible = false;
                        } else if (mode === 'clay') {
                            c.material = clayMaterial;
                            if(wire) wire.visible = false;
                        } else if (mode === 'wire') {
                            c.material = clayMaterial;
                            if(wire) wire.visible = true;
                        }
                    }
                });
            };

            bF.onclick = () => { bF.classList.add('active'); setMode('final'); };
            bG.onclick = () => { bG.classList.add('active'); setMode('clay'); };
            bW.onclick = () => { bW.classList.add('active'); setMode('wire'); };

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
