<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>3D Portfolio Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon-green: #98ff98;
            --bg-glass: rgba(152, 255, 152, 0.15);
            --border-glass: rgba(152, 255, 152, 0.3);
        }
        body { margin: 0; background: #0a0a0a; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }

        .stats-box {
            position: absolute; top: 15px; left: 15px;
            background: var(--bg-glass); color: var(--neon-green);
            padding: 10px; border-radius: 10px; font-size: 10px;
            border: 1px solid var(--border-glass); backdrop-filter: blur(8px);
            z-index: 100; pointer-events: none; letter-spacing: 1px;
        }

        .controls {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; background: rgba(0, 0, 0, 0.7);
            padding: 6px; border-radius: 20px; z-index: 100;
            border: 1px solid var(--border-glass);
        }
        button {
            background: transparent; color: var(--neon-green); border: none; padding: 10px 16px;
            border-radius: 15px; cursor: pointer; font-size: 12px; font-weight: bold;
            transition: 0.2s; opacity: 0.6;
        }
        button.active { background: var(--bg-glass); opacity: 1; }

        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: transparent; color: var(--neon-green);
            font-size: 45px; border: none; cursor: pointer;
            padding: 20px; z-index: 100; opacity: 0.3; transition: 0.2s;
        }
        .nav-arrow:active { opacity: 1; scale: 0.9; }
        .prev { left: 5px; }
        .next { right: 5px; }

        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--neon-green); font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="loader">LOADING...</div>
    
    <div class="stats-box" id="stats" style="display: none;">
        <div style="font-weight: bold;" id="model-name">MODEL: NONE</div>
        <div>Tris: <span id="tris">0</span></div>
        <div>Verts: <span id="verts">0</span></div>
    </div>

    <button class="nav-arrow prev" onclick="prevModel()">&#8249;</button>
    <button class="nav-arrow next" onclick="nextModel()">&#8250;</button>

    <div class="controls">
        <button id="btnFinal" class="active" onclick="changeView('final')">FINAL</button>
        <button id="btnClay" onclick="changeView('clay')">CLAY</button>
        <button id="btnWire" onclick="changeView('wire')">WIRE</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        let scene, camera, renderer, controls, mainModel;
        let currentMode = 'final';
        let currentIndex = 0;
        let idleTimer;
        const modelFiles = ['jab_1.glb', 'jab_2.glb', 'jab_3.glb', 'jab_4.glb'];
        const clayMat = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.6, metalness: 0.1 });

        window.nextModel = () => { currentIndex = (currentIndex + 1) % modelFiles.length; loadCurrentModel(); };
        window.prevModel = () => { currentIndex = (currentIndex - 1 + modelFiles.length) % modelFiles.length; loadCurrentModel(); };

        window.changeView = function(mode) {
            currentMode = mode;
            if (!mainModel) return;
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            const activeBtn = mode === 'final' ? 'btnFinal' : (mode === 'clay' ? 'btnClay' : 'btnWire');
            document.getElementById(activeBtn).classList.add('active');

            mainModel.traverse(c => {
                if (c.isMesh) {
                    const wire = c.getObjectByName("wireframe");
                    if (mode === 'final') {
                        c.material = c.userData.originalMaterial;
                        if(wire) wire.visible = false;
                    } else {
                        c.material = clayMat;
                        if(wire) wire.visible = (mode === 'wire');
                    }
                }
            });
        };

        function resetIdleTimer() {
            if (!controls) return;
            controls.autoRotate = false;
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                controls.autoRotate = true;
            }, 3000);
        }

        function loadCurrentModel() {
            if (mainModel) {
                mainModel.traverse(c => {
                    if (c.isMesh) {
                        c.geometry.dispose();
                        if (c.userData.originalMaterial && c.userData.originalMaterial.dispose) c.userData.originalMaterial.dispose();
                    }
                });
                scene.remove(mainModel);
            }

            document.getElementById('loader').style.display = 'block';
            
            const loader = new GLTFLoader();
            loader.load(modelFiles[currentIndex], (gltf) => {
                mainModel = gltf.scene;
                
                let tris = 0, verts = 0;

                // --- ИСПРАВЛЕНИЕ "УЛЕТАНИЯ" ---
                const box = new THREE.Box3().setFromObject(mainModel);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                // Центрируем геометрию внутри объекта
                mainModel.position.x += (mainModel.position.x - center.x);
                mainModel.position.y += (mainModel.position.y - center.y);
                mainModel.position.z += (mainModel.position.z - center.z);
                
                scene.add(mainModel);

                // Настраиваем камеру под размер модели
                const maxDim = Math.max(size.x, size.y, size.z);
                const fov = camera.fov * (Math.PI / 180);
                let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
                cameraZ *= 1.5; // Немного отдаляем
                
                camera.position.set(0, maxDim / 4, cameraZ);
                camera.updateProjectionMatrix();
                
                if(controls) {
                    controls.target.set(0, 0, 0);
                    controls.update();
                }

                mainModel.traverse(c => {
                    if (c.isMesh) {
                        c.userData.originalMaterial = c.material;
                        tris += c.geometry.index ? c.geometry.index.count / 3 : c.geometry.attributes.position.count / 3;
                        verts += c.geometry.attributes.position.count;
                        
                        const wGeom = new THREE.WireframeGeometry(c.geometry);
                        const wLine = new THREE.LineSegments(wGeom, new THREE.LineBasicMaterial({ 
                            color: 0x98ff98, transparent: true, opacity: 0.3 
                        }));
                        wLine.name = "wireframe";
                        wLine.visible = false;
                        c.add(wLine); 
                    }
                });

                document.getElementById('tris').innerText = Math.round(tris).toLocaleString();
                document.getElementById('verts').innerText = Math.round(verts).toLocaleString();
                document.getElementById('model-name').innerText = modelFiles[currentIndex].split('.')[0].toUpperCase();
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('stats').style.display = 'block';
                
                changeView(currentMode);
                resetIdleTimer();
            });
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotateSpeed = 2.0;

            // Обработка касаний для остановки вращения
            renderer.domElement.addEventListener('pointerdown', resetIdleTimer);

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light);

            loadCurrentModel();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
